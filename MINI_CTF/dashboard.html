<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f3f4f6;
            color: #1f2937;
        }
    </style>
</head>
<body class="min-h-screen pb-12">
    <!-- Navbar -->
    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tight">CyberGame</h1>
            <div class="flex items-center gap-4">
                <div class="bg-blue-800/50 px-3 py-1 rounded-full text-sm font-semibold">
                    <span id="playerNameDisplay">Player</span>
                </div>
                <div class="text-sm font-bold bg-white text-blue-600 px-3 py-1 rounded-full shadow-sm">
                    Solved: <span id="solvedCount">0 / 0</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-6 mt-8 space-y-8">
        
        <div class="text-center md:text-left">
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Choose a Quiz!</h2>
            <p class="text-gray-500 font-medium">Select any of the games below to earn points and learn.</p>
        </div>

        <!-- Challenges Grid -->
        <div id="challenges-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- Cards will be injected here -->
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const sessionId = localStorage.getItem('ctf_session_id');
            const operatorName = localStorage.getItem('ctf_operator_name');
            
            if (!sessionId) {
                window.location.href = '/terminal.html';
                return;
            }
            
            document.getElementById('playerNameDisplay').textContent = operatorName;
            
            try {
                const res = await fetch('/challenges', {
                    headers: { 'sessionId': sessionId }
                });
                if (res.status === 401) {
                    window.location.href = '/terminal.html';
                    return;
                }
                const challenges = await res.json();
                
                const solvedCount = challenges.filter(c => c.solved).length;
                document.getElementById('solvedCount').textContent = `${solvedCount} / ${challenges.length}`;
                
                const grid = document.getElementById('challenges-grid');
                grid.innerHTML = '';
                
                challenges.forEach(challenge => {
                    // Emoji mapping based on ID
                    let emoji = '🧩';
                    if (challenge.id === 'web') emoji = '🕵️';
                    if (challenge.id === 'crypto') emoji = '🔠';
                    if (challenge.id === 'osint') emoji = '🔎';
                    if (challenge.id === 'password') emoji = '🔐';
                    if (challenge.id === 'phishing') emoji = '⚠️';
                    if (challenge.id === 'url') emoji = '🌐';
                    
                    const isSolved = challenge.solved;
                    const diffColor = challenge.difficulty === 'Easy' ? 'bg-green-100 text-green-800' : 'bg-orange-100 text-orange-800';
                    const statusUI = isSolved 
                        ? `<span class="bg-blue-100 text-blue-700 font-bold px-3 py-1 rounded-full text-xs">✅ Solved</span>`
                        : `<span class="${diffColor} font-bold px-3 py-1 rounded-full text-xs">${challenge.difficulty}</span>`;
                        
                    const cardClass = isSolved 
                        ? 'border-2 border-blue-400 bg-blue-50/30' 
                        : 'border-2 border-transparent bg-white hover:border-blue-300 hover:shadow-lg hover:-translate-y-1';
                    
                    let pointsText = `${challenge.points} Points`;
                    if (challenge.firstBloodAvailable && !isSolved) {
                        pointsText += ' (+20 Bonus!)';
                    }

                    const card = document.createElement('div');
                    card.className = `p-6 rounded-3xl shadow-sm transition-all cursor-pointer flex flex-col h-full relative overflow-hidden ${cardClass}`;
                    card.onclick = () => { window.location.href = `/challenge_core.html?id=${challenge.id}`; };
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div class="text-4xl bg-gray-50 w-14 h-14 rounded-2xl flex items-center justify-center shadow-sm">
                                ${emoji}
                            </div>
                            ${statusUI}
                        </div>
                        <h3 class="text-xl font-extrabold text-gray-900 mb-1">${challenge.title}</h3>
                        <p class="text-gray-500 font-medium text-sm flex-grow mb-6 leading-relaxed">${challenge.description}</p>
                        <div class="mt-auto flex justify-between items-center pt-4 border-t border-gray-100">
                            <span class="font-bold text-blue-600">${pointsText}</span>
                            <span class="text-gray-400 font-bold text-xl leading-none">&rarr;</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
            } catch (err) {
                console.error(err);
                document.getElementById('challenges-grid').innerHTML = '<p class="text-red-500 font-bold">Could not load games. Please refresh.</p>';
            }
        });
    </script>
</body>
</html>
