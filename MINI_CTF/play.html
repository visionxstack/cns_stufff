<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>CyberQuest — Choose Your Path</title>
    <meta name="description" content="Choose a cybersecurity category to explore. 7 categories, 42 challenges." />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0b1120;
            --surface: #111827;
            --card: #1a2332;
            --border: rgba(99, 179, 237, 0.12);
            --accent: #00d4aa;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --font: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 120px;
        }

        /* BG */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59,130,246,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── STICKY HEADER ─── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11,17,32,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
        }

        .header-inner {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            font-size: 22px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-chip {
            background: rgba(0,212,170,0.12);
            border: 1px solid rgba(0,212,170,0.3);
            border-radius: 100px;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
        }

        .player-chip {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── CONTENT ─── */
        .content {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Overall progress */
        .overall-progress {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .overall-progress::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, #3b82f6, #00d4aa, #8b5cf6);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .progress-count {
            font-size: 15px;
            font-weight: 800;
            color: var(--accent);
        }

        .progress-bar-track {
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #00d4aa);
            border-radius: 100px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .progress-subtitle {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* Section title */
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 14px;
        }

        /* Category cards */
        .categories-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .category-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            display: block;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background: var(--cat-color);
            transition: width 0.2s;
        }

        .category-card:hover,
        .category-card:active {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .category-card:active {
            transform: scale(0.98);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 14px;
        }

        .card-emoji {
            font-size: 36px;
            line-height: 1;
            flex-shrink: 0;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 19px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .card-badge {
            flex-shrink: 0;
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(255,255,255,0.06);
            color: var(--text-dim);
        }

        .card-badge.done {
            background: rgba(34,197,94,0.12);
            color: #4ade80;
        }

        /* Level dots */
        .level-dots {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .dot {
            width: 24px;
            height: 8px;
            border-radius: 100px;
            background: rgba(255,255,255,0.08);
            transition: background 0.3s;
        }

        .dot.solved {
            background: var(--cat-color);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-solved-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
        }

        .card-solved-text .count {
            color: var(--text);
        }

        .card-arrow {
            font-size: 18px;
            color: var(--text-dim);
            transition: transform 0.2s;
        }

        .category-card:hover .card-arrow {
            transform: translateX(4px);
            color: var(--accent);
        }

        /* Completed state */
        .category-card.completed {
            border-color: rgba(34,197,94,0.25);
        }

        /* ─── BOTTOM LEADERBOARD TEASER ─── */
        .lb-teaser {
            margin-top: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .lb-teaser:hover {
            border-color: rgba(255,255,255,0.15);
        }

        .lb-teaser-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .lb-teaser-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lb-teaser-icon { font-size: 28px; }
        .lb-teaser-title { font-size: 16px; font-weight: 700; color: var(--text); }
        .lb-teaser-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

        /* ─── LEADERBOARD MODAL ─── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal-sheet {
            background: #151f2e;
            border: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px 20px 40px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 100px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 20px;
            text-align: center;
        }

        .lb-row-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .lb-rank {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            flex-shrink: 0;
            background: rgba(255,255,255,0.06);
            color: var(--text-dim);
        }

        .lb-rank.r1 { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .lb-rank.r2 { background: rgba(148,163,184,0.15); color: #94a3b8; }
        .lb-rank.r3 { background: rgba(180,120,60,0.15); color: #cd7f32; }

        .lb-name { flex: 1; font-size: 16px; font-weight: 700; color: var(--text); }
        .lb-score { font-size: 18px; font-weight: 800; color: var(--accent); }

        .lb-empty { text-align: center; padding: 40px 0; color: var(--text-dim); font-size: 15px; }

        /* Logout */
        .logout-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 14px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            color: #fca5a5;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        .logout-btn:hover { background: rgba(239,68,68,0.14); }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            height: 130px;
            border-radius: 20px;
            margin-bottom: 14px;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- SESSION OVERLAY -->
    <div id="sessionOverlay" style="display:none; position:fixed; inset:0; background:rgba(11,17,32,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;">
        <h2 style="font-size:32px; font-weight:900; color:var(--text); margin-bottom:12px;">Game Closed</h2>
        <p style="font-size:18px; color:var(--text-dim);">Thank you for participating in CyberQuest!</p>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <div class="header-brand">
                <span class="header-logo">🛡️</span>
                <span class="header-title">CyberQuest</span>
            </div>
            <div class="header-right">
                <div class="score-chip" id="scoreChip">0 pts</div>
                <div class="player-chip" id="playerChip">Player</div>
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="content">

        <!-- Overall Progress -->
        <div class="overall-progress" id="overallProgress">
            <div class="progress-header">
                <span class="progress-title">Overall Progress</span>
                <span class="progress-count" id="progressCount">0 / 42</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-subtitle" id="progressSubtitle">Start your first challenge below 👇</div>
        </div>

        <div class="section-title">Choose a Category</div>

        <!-- Loading skeletons -->
        <div id="skeletonList">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>

        <!-- Categories -->
        <div class="categories-list" id="categoriesList" style="display:none"></div>

        <!-- Leaderboard teaser -->
        <div class="lb-teaser" onclick="openLeaderboard()">
            <div class="lb-teaser-inner">
                <div class="lb-teaser-left">
                    <span class="lb-teaser-icon">🏆</span>
                    <div>
                        <div class="lb-teaser-title">Live Leaderboard</div>
                        <div class="lb-teaser-sub">See the top players right now</div>
                    </div>
                </div>
                <span style="font-size:20px;color:var(--text-dim)">→</span>
            </div>
        </div>

        <!-- Logout -->
        <button class="logout-btn" onclick="logout()">← Leave Game & Change Player</button>

    </main>

    <!-- LEADERBOARD MODAL -->
    <div class="modal-backdrop" id="lbModal" onclick="closeLbOnBackdrop(event)">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-title">🏆 Live Leaderboard</div>
            <div id="lbContent"><div class="lb-empty">Loading...</div></div>
        </div>
    </div>

    <script>
        const sessionId = localStorage.getItem('ctf_session_id');
        const playerName = localStorage.getItem('ctf_player_name');

        if (!sessionId) {
            window.location.href = '/';
        }

        document.getElementById('playerChip').textContent = playerName || 'Player';

        // ─── SOCKET SESSION ───────────────────────────────────────────────────
        const socket = io();
        socket.on('session_state', data => {
            document.getElementById('sessionOverlay').style.display = data.active ? 'none' : 'flex';
        });

        // ─── LOAD DATA ─────────────────────────────────────────────────────────
        async function loadData() {
            try {
                const [catRes, progRes] = await Promise.all([
                    fetch('/categories', { headers: { 'sessionId': sessionId } }),
                    fetch('/progress', { headers: { 'sessionId': sessionId } })
                ]);

                if (catRes.status === 401 || progRes.status === 401) {
                    window.location.href = '/';
                    return;
                }

                const categories = await catRes.json();
                const progress = await progRes.json();

                renderProgress(progress);
                renderCategories(categories);

            } catch(e) {
                console.error(e);
            }
        }

        function renderProgress(progress) {
            const { score, solved, total } = progress;
            document.getElementById('scoreChip').textContent = `${score} pts`;
            document.getElementById('progressCount').textContent = `${solved} / ${total}`;

            const pct = total > 0 ? (solved / total * 100) : 0;
            document.getElementById('progressFill').style.width = pct + '%';

            let subtitle = 'Start your first challenge below 👇';
            if (solved > 0 && solved < total) {
                const pctRound = Math.round(pct);
                subtitle = `${pctRound}% complete — keep going! 💪`;
            } else if (solved >= total) {
                subtitle = '🎉 All challenges completed! Amazing!';
            }
            document.getElementById('progressSubtitle').textContent = subtitle;
        }

        function renderCategories(categories) {
            document.getElementById('skeletonList').style.display = 'none';
            const list = document.getElementById('categoriesList');
            list.style.display = 'flex';
            list.innerHTML = '';

            categories.forEach(cat => {
                const isComplete = cat.solvedLevels >= cat.totalLevels;
                const pct = cat.totalLevels > 0 ? cat.solvedLevels / cat.totalLevels : 0;

                // Build dots
                const dots = Array.from({ length: cat.totalLevels }, (_, i) =>
                    `<div class="dot ${i < cat.solvedLevels ? 'solved' : ''}" style="--cat-color:${cat.color}"></div>`
                ).join('');

                // Difficulty labels
                const diffLabels = ['Beg', 'Beg', 'Mid', 'Mid', 'Adv', 'Adv', 'Expert'];

                const card = document.createElement('a');
                card.className = `category-card${isComplete ? ' completed' : ''}`;
                card.href = `/category.html?id=${cat.id}`;
                card.style.setProperty('--cat-color', cat.color);

                card.innerHTML = `
                    <div class="card-top">
                        <div class="card-emoji">${cat.emoji}</div>
                        <div class="card-info">
                            <div class="card-title">${cat.title}</div>
                            <div class="card-desc">${cat.description}</div>
                        </div>
                        <div class="card-badge ${isComplete ? 'done' : ''}">
                            ${isComplete ? '✅ Done' : `${cat.solvedLevels}/${cat.totalLevels}`}
                        </div>
                    </div>
                    <div class="level-dots">${dots}</div>
                    <div class="card-meta">
                        <div class="card-solved-text">
                            <span class="count">${cat.solvedLevels}</span> of ${cat.totalLevels} levels solved
                        </div>
                        <span class="card-arrow">→</span>
                    </div>
                `;

                list.appendChild(card);
            });
        }

        // ─── LEADERBOARD ───────────────────────────────────────────────────────
        function openLeaderboard() {
            document.getElementById('lbModal').classList.add('open');
            fetchLeaderboard();
        }

        function closeLbOnBackdrop(e) {
            if (e.target === document.getElementById('lbModal')) {
                document.getElementById('lbModal').classList.remove('open');
            }
        }

        async function fetchLeaderboard() {
            try {
                const res = await fetch('/leaderboard');
                const data = await res.json();
                renderLeaderboard(data);
            } catch(e) {}
        }

        function renderLeaderboard(data) {
            const content = document.getElementById('lbContent');
            if (!data.length) {
                content.innerHTML = '<div class="lb-empty">No players yet! Be the first 🚀</div>';
                return;
            }

            const medals = ['🥇', '🥈', '🥉'];
            const rankClasses = ['r1', 'r2', 'r3'];

            content.innerHTML = data.map((user, i) => `
                <div class="lb-row-item">
                    <div class="lb-rank ${rankClasses[i] || ''}">
                        ${medals[i] || (i + 1)}
                    </div>
                    <div class="lb-name">${escapeHtml(user.name)}${user.name === playerName ? ' 👈' : ''}</div>
                    <div class="lb-score">${user.score}</div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        // ─── LOGOUT ────────────────────────────────────────────────────────────
        function logout() {
            if (confirm('Leave the game? Your progress will be lost if the server resets.')) {
                localStorage.removeItem('ctf_session_id');
                localStorage.removeItem('ctf_player_name');
                window.location.href = '/';
            }
        }

        // ─── INIT ──────────────────────────────────────────────────────────────
        loadData();
    </script>
</body>
</html>
