<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber Security Quiz Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            color: #1f2937;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">
    <!-- 
        Hey there, curious player!
        You're looking at the source code. That's exactly what you need to do for the Web challenge!
        Here is your secret flag: CTF{h1dd3n_1n_pl41n_51gh7}
    -->

    <main class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden transform transition-all">
        <!-- Header -->
        <div class="bg-blue-600 p-8 text-center">
            <h1 class="text-3xl font-extrabold text-white mb-2">Cyber Security<br>Quiz Game!</h1>
            <p class="text-blue-100 font-medium">Learn the basics of staying safe online.</p>
        </div>

        <!-- Form -->
        <div class="p-8 space-y-6">
            <div id="errorMsg" class="hidden bg-red-100 text-red-700 p-4 rounded-xl font-semibold text-center text-sm">
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Choose a Player Name</label>
                    <input type="text" id="playerName" autocomplete="off" placeholder="e.g. CyberHero99" required
                        class="w-full px-5 py-4 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 focus:bg-white transition-colors text-lg font-semibold placeholder:font-normal placeholder:text-gray-400">
                </div>
                
                <button type="submit" id="startBtn"
                    class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg shadow-blue-500/30 transform active:scale-95 transition-all">
                    Start Playing 🚀
                </button>
            </form>
        </div>
    </main>

    <footer class="mt-8 text-gray-400 text-sm font-medium">
        Educational Platform • College Event
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('playerName').value.trim();
            if (!nameInput) return;

            const btn = document.getElementById('startBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.innerText = 'Loading...';
            errorMsg.classList.add('hidden');

            try {
                const res = await fetch('/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nameInput })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('ctf_session_id', data.sessionId);
                    localStorage.setItem('ctf_operator_name', data.name);
                    window.location.href = '/dashboard.html';
                } else {
                    errorMsg.innerText = data.error || 'Oops, something went wrong!';
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = 'Start Playing 🚀';
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = 'Cannot connect to the game server right now.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'Start Playing 🚀';
            }
        });
    </script>
</body>
</html>
