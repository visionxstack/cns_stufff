<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Question</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f3f4f6;
            color: #1f2937;
        }
    </style>
</head>
<body class="min-h-screen pb-12 flex flex-col items-center p-6">
    
    <!-- Navigation back -->
    <div class="w-full max-w-2xl mb-6">
        <a href="/dashboard.html" class="inline-flex items-center text-blue-600 font-bold hover:underline bg-white px-4 py-2 rounded-full shadow-sm">
            &larr; Back to Games
        </a>
    </div>

    <!-- Main Card -->
    <main class="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-8 flex justify-between items-center text-white">
            <h1 id="titleEl" class="text-2xl md:text-3xl font-extrabold tracking-tight">Loading...</h1>
            <div class="bg-blue-800/50 px-4 py-2 rounded-full font-bold shadow-inner">
                <span id="scorePotentialEl">--</span> Points
            </div>
        </div>

        <!-- Question Body -->
        <div class="p-8">
            <p id="objectiveContainer" class="text-xl md:text-2xl font-semibold leading-relaxed text-gray-800 mb-8">
                Loading question...
            </p>

            <hr class="border-gray-100 mb-8">

            <!-- Input Area -->
            <div id="interactionArea" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-2 uppercase tracking-wide">Your Answer</label>
                    <input type="text" id="flag-input" autocomplete="off" placeholder="Type your answer here..."
                        class="w-full px-6 py-4 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-0 focus:bg-white transition-colors text-xl font-bold placeholder:font-normal placeholder:text-gray-400">
                </div>

                <div id="feedbackMsg" class="hidden font-bold text-center py-3 rounded-xl text-lg">
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                    <button id="submit-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl text-lg shadow-lg shadow-blue-500/30 transform active:scale-95 transition-all">
                        Check Answer ✔️
                    </button>
                    
                    <button id="hint-btn" class="sm:w-1/3 bg-orange-100 hover:bg-orange-200 text-orange-700 font-bold py-4 px-6 rounded-xl text-lg transition-all">
                        Need a Hint? 💡
                    </button>
                </div>
                
                <p id="hintIndicatorEl" class="text-center text-sm font-semibold text-orange-600 mt-2">
                    <!-- Hint warning injected here -->
                </p>
            </div>
        </div>
    </main>

    <!-- Modal for Hint -->
    <div id="hintModal" class="hidden fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl transform scale-100 text-center">
            <div class="text-5xl mb-4">🤔</div>
            <h3 class="text-2xl font-extrabold text-gray-900 mb-2">Are you sure?</h3>
            <p id="hintWarningText" class="text-gray-600 font-medium mb-8">Using this hint will reduce your score for this level.</p>
            
            <div class="space-y-3">
                <button id="confirmHintBtn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl text-lg transition-colors">
                    Yes, show me the hint
                </button>
                <button id="cancelHintBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-xl text-lg transition-colors">
                    Nevermind, I can do it!
                </button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const challengeId = urlParams.get('id');
        const sessionId = localStorage.getItem('ctf_session_id');

        if (!sessionId || !challengeId) {
            window.location.href = '/dashboard.html';
        }

        const flagInput = document.getElementById('flag-input');
        const submitBtn = document.getElementById('submit-btn');
        const hintBtn = document.getElementById('hint-btn');
        const feedbackMsg = document.getElementById('feedbackMsg');
        
        const hintModal = document.getElementById('hintModal');
        const confirmHintBtn = document.getElementById('confirmHintBtn');
        const cancelHintBtn = document.getElementById('cancelHintBtn');

        let hintPenalty = 0;
        let isSolved = false;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch(`/challenge/${challengeId}`, {
                    headers: { 'sessionId': sessionId }
                });
                
                if (!res.ok) {
                    window.location.href = '/dashboard.html';
                    return;
                }
                
                const challenge = await res.json();
                
                document.getElementById('titleEl').textContent = challenge.title;
                document.getElementById('objectiveContainer').innerHTML = challenge.question.replace(/\n/g, '<br><br>');
                
                let pointsStr = challenge.points;
                if (challenge.firstBloodAvailable) pointsStr += ' (+20 Bonus)';
                document.getElementById('scorePotentialEl').textContent = pointsStr;
                
                hintPenalty = challenge.hintDeduction;
                document.getElementById('hintIndicatorEl').textContent = `⚠️ Using a hint will reduce your score by ${hintPenalty} points.`;
                document.getElementById('hintWarningText').textContent = `Using this hint will reduce your score by ${hintPenalty} points!`;
                
                if (challenge.hintRequested) {
                    revealHint(challenge.hintRequested);
                } else if (challenge.solved) {
                    markSolved();
                }

            } catch(e) {
                console.error(e);
            }
        });

        // Hint Logic
        hintBtn.addEventListener('click', () => {
            if (isSolved || hintBtn.disabled) return;
            hintModal.classList.remove('hidden');
        });

        cancelHintBtn.addEventListener('click', () => {
            hintModal.classList.add('hidden');
        });

        confirmHintBtn.addEventListener('click', async () => {
            hintModal.classList.add('hidden');
            try {
                const res = await fetch('/hint', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'sessionId': sessionId },
                    body: JSON.stringify({ challengeId })
                });
                const data = await res.json();
                if (data.hint) {
                    revealHint(data.hint);
                    showFeedback('Hint used! Points adjusted.', 'orange');
                }
            } catch(e) {
                console.error(e);
            }
        });

        function revealHint(hintText) {
            hintBtn.disabled = true;
            hintBtn.classList.remove('bg-orange-100', 'hover:bg-orange-200', 'text-orange-700');
            hintBtn.classList.add('bg-gray-100', 'text-gray-700', 'cursor-default');
            hintBtn.innerHTML = `<span class="block text-sm font-normal mb-1">Your Hint:</span><span class="font-bold leading-tight">${hintText}</span>`;
            document.getElementById('hintIndicatorEl').classList.add('hidden');
        }

        function markSolved() {
            isSolved = true;
            submitBtn.disabled = true;
            submitBtn.textContent = "✅ Correct! Solved.";
            submitBtn.classList.add('bg-green-500', 'hover:bg-green-500', 'cursor-default');
            submitBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'transform', 'active:scale-95');
            flagInput.disabled = true;
            flagInput.value = "Great job! Return to Dashboard.";
            flagInput.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
            hintBtn.classList.add('hidden');
            document.getElementById('hintIndicatorEl').classList.add('hidden');
        }

        function showFeedback(msg, color) {
            feedbackMsg.textContent = msg;
            feedbackMsg.className = `font-bold text-center py-3 rounded-xl text-lg bg-${color}-100 text-${color}-800`;
            feedbackMsg.classList.remove('hidden');
            setTimeout(() => {
                if(!isSolved) feedbackMsg.classList.add('hidden');
            }, 3000);
        }

        // Submission
        flagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !submitBtn.disabled) {
                processSubmission();
            }
        });

        submitBtn.addEventListener('click', processSubmission);

        async function processSubmission() {
            const val = flagInput.value.trim();
            if (!val) return;

            submitBtn.disabled = true;
            submitBtn.textContent = "Checking...";

            try {
                const res = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'sessionId': sessionId },
                    body: JSON.stringify({ challengeId, flag: val })
                });
                
                const data = await res.json();
                
                submitBtn.disabled = false;
                
                if (res.status === 429) {
                    const secs = Math.ceil(data.wait/1000);
                    showFeedback(`Too fast! Wait ${secs} seconds.`, 'orange');
                    submitBtn.textContent = `Wait (${secs}s)`;
                    setTimeout(() => { submitBtn.textContent = "Check Answer ✔️"; }, data.wait);
                    return;
                }
                
                if (data.error === 'ALREADY_SOLVED') {
                    markSolved();
                    return;
                }
                
                if (data.correct) {
                    showFeedback('Correct! Amazing job! 🎉', 'green');
                    markSolved();
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                } else {
                    showFeedback('Try again! That wasn\'t it. ❌', 'red');
                    submitBtn.textContent = "Check Answer ✔️";
                    flagInput.value = '';
                    flagInput.focus();
                }
            } catch(e) {
                console.error(e);
                submitBtn.disabled = false;
                submitBtn.textContent = "Check Answer ✔️";
                showFeedback('Network Error', 'red');
            }
        }
    </script>
</body>
</html>
